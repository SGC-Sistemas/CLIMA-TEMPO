<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clima Tech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #0284c7);
      color: white;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(56, 189, 248, 0.25);
      border-radius: 50%;
      filter: blur(80px);
      top: -120px;
      right: -120px;
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(14, 165, 233, 0.2);
      border-radius: 50%;
      filter: blur(90px);
      bottom: -100px;
      left: -100px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 430px;
      padding: 35px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      text-align: center;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #bae6fd;
      margin-bottom: 28px;
      font-size: 15px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      outline: none;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.9);
      color: #0f172a;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.6);
    }

    #resultado {
      margin-top: 15px;
    }

    .card-clima {
      padding: 25px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.18);
      animation: aparecer 0.5s ease;
    }

    .card-clima h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .temperatura {
      font-size: 48px;
      font-weight: bold;
      color: #7dd3fc;
      margin: 10px 0;
    }

    .descricao {
      text-transform: capitalize;
      font-size: 18px;
      color: #e0f2fe;
    }

    .erro {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.2);
      padding: 14px;
      border-radius: 14px;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">🌦️</div>

    <h1>Clima Tech</h1>
    <p class="subtitle">Consulte o clima em tempo real</p>

    <div class="search-box">
      <input id="cidade" placeholder="Digite a cidade">
      <button onclick="buscarClima()">Buscar</button>
    </div>

    <div id="resultado"></div>
  </div>

  <script>
    async function buscarClima() {
      const cidade = document.getElementById("cidade").value.trim();
      const resultado = document.getElementById("resultado");
      const apiKey = "SUA_API_KEY_AQUI";

      if (cidade === "") {
        resultado.innerHTML = `<p class="erro">Digite uma cidade.</p>`;
        return;
      }

      resultado.innerHTML = `<p>Buscando dados...</p>`;

      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cidade)}&appid=${apiKey}&units=metric&lang=pt_br`;

      try {
        const resposta = await fetch(url);
        const dados = await resposta.json();

        if (dados.cod != 200) {
          resultado.innerHTML = `<p class="erro">Erro: ${dados.message}</p>`;
          return;
        }

        resultado.innerHTML = `
          <div class="card-clima">
            <h2>${dados.name}</h2>
            <div class="temperatura">${Math.round(dados.main.temp)}°C</div>
            <p class="descricao">${dados.weather[0].description}</p>
            <p>Sensação térmica: ${Math.round(dados.main.feels_like)}°C</p>
            <p>Umidade: ${dados.main.humidity}%</p>
          </div>
        `;
      } catch (erro) {
        resultado.innerHTML = `<p class="erro">Erro ao buscar clima.</p>`;
        console.error(erro);
      }
    }
  </script>
</body>
</html>
