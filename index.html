<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NÃO EXISTE TEMPO RUIM !!!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

/* 🌌 FUNDO CINEMÁTICO */
body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #020617, #0ea5e9);
  color: white;
}

/* ☁️ MAR DE NUVENS */
.cloud-layer {
  position: absolute;
  inset: 0;
  background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000") no-repeat center/cover;
  animation: floatClouds 80s linear infinite;
  filter: brightness(0.8) contrast(1.1);
}

/* SEGUNDA CAMADA PARA PROFUNDIDADE */
.cloud-layer::after {
  content: "";
  position: absolute;
  inset: 0;
  background: inherit;
  opacity: .4;
  transform: scale(1.2);
  animation: floatClouds 120s linear infinite reverse;
}

@keyframes floatClouds {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

/* ☀️ LUZ DO SOL */
.sun-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  right: 10%;
  top: 10%;
  background: radial-gradient(circle, #fde68a, transparent 70%);
  filter: blur(80px);
  animation: pulse 6s ease-in-out infinite;
}

@keyframes pulse {
  50% { transform: scale(1.1); opacity: 0.9; }
}

/* ✨ PARTÍCULAS */
.particles {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 100px 100px;
  opacity: .15;
  animation: moveParticles 40s linear infinite;
}

@keyframes moveParticles {
  from { transform: translateY(0); }
  to { transform: translateY(100px); }
}

/* 💎 GLASS CARD */
.card {
  position: relative;
  z-index: 10;
  width: 95%;
  max-width: 500px;
  padding: 35px;
  border-radius: 30px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  animation: floatCard 6s ease-in-out infinite;
}

@keyframes floatCard {
  50% { transform: translateY(-12px); }
}

/* TÍTULO */
h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  color: #dbeafe;
  margin-bottom: 25px;
}

/* 🔍 BUSCA */
.search {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 15px;
  border: none;
  outline: none;
}

button {
  padding: 14px 18px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* RESULTADO */
.weather {
  padding: 25px;
  border-radius: 25px;
  background: rgba(0,0,0,0.3);
  text-align: center;
}

.temp {
  font-size: 60px;
  font-weight: bold;
}

.desc {
  margin-top: 10px;
  text-transform: capitalize;
}

.details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.detail {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="cloud-layer"></div>
<div class="sun-glow"></div>
<div class="particles"></div>

<div class="card">
  <h3>☁️ NÃO EXISTE TEMPO RUIM!!!</h3>
  <p class="subtitle">CARPE DIEM !!! !!!</p>

  <div class="search">
    <input id="cidade" placeholder="Digite a cidade...">
    <button onclick="buscarClima()">Buscar</button>
  </div>

  <div id="resultado"></div>
</div>

<script>
async function buscarClima() {
  const cidade = document.getElementById("cidade").value.trim();
  const resultado = document.getElementById("resultado");
  const apiKey = "SUA_API_KEY_AQUI";

  if (!cidade) {
    resultado.innerHTML = "Digite uma cidade.";
    return;
  }

  resultado.innerHTML = "Carregando...";

  try {
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${cidade}&appid=${apiKey}&units=metric&lang=pt_br`
    );
    const data = await res.json();

    if (data.cod != 200) {
      resultado.innerHTML = data.message;
      return;
    }

    resultado.innerHTML = `
      <div class="weather">
        <h2>${data.name}</h2>
        <div class="temp">${Math.round(data.main.temp)}°</div>
        <div class="desc">${data.weather[0].description}</div>

        <div class="details">
          <div class="detail">🌡️ ${data.main.feels_like}°</div>
          <div class="detail">💧 ${data.main.humidity}%</div>
          <div class="detail">🌬️ ${data.wind.speed} m/s</div>
          <div class="detail">🔽 ${data.main.pressure} hPa</div>
        </div>
      </div>
    `;
  } catch {
    resultado.innerHTML = "Erro ao buscar clima.";
  }
}
</script>

</body>
</html>
